name: Weekly Substack digest

on:
  # The scheduled run lives in a LOCAL launchd job instead of here:
  # Substack (Cloudflare) 403s datacenter IPs, so juliadeluca.substack.com
  # only loads from a residential IP. This Action is kept for MANUAL runs.
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: weekly-digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build digest
        run: python3 scripts/build_digests.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Substack digest $(date -u +%Y-%m-%d)"
            git push
          fi
